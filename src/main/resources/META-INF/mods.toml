modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "MIT"

# Displayed in the Forge mod list screen
[[mods]]
    modId          = "structuregen"
    version        = "${mod_version}"
    displayName    = "Structure Generator"
    description    = '''
        Modular, world-persistent procedural structure generation API for Minecraft Forge 1.20.1.
        Provides a full public API for registering custom room templates, assembly rules,
        spawn populators and post-processors. Intended as a standalone library mod.
    '''
    # logoFile is optional; supply once a logo asset exists
    # logoFile = "structuregen.png"

# ---- Dependencies ----------------------------------------------------------------

[[dependencies.structuregen]]
    # Forge itself
    modId       = "forge"
    mandatory   = true
    versionRange = "${forge_version_range}"
    ordering    = "NONE"
    side        = "BOTH"

[[dependencies.structuregen]]
    # Minecraft client / server
    modId       = "minecraft"
    mandatory   = true
    versionRange = "${minecraft_version_range}"
    ordering    = "NONE"
    side        = "BOTH"
